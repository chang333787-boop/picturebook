<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>가지 프로그램</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg:#f4f8ff; --panel:#fff; --primary:#4a90d9;
      --start:#06d6a0; --ending:#ef476f; --choiceA:#4a90d9; --choiceB:#ef476f;
      --text:#1e2d3d; --muted:#7a8fa6;
      --shadow:rgba(30,60,100,0.12); --radius:14px;
      --font-h:'Jua',sans-serif; --font-b:'Nanum Gothic',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* 입장 화면 */
    #join-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
    #join-screen.hidden{display:none;}
    .join-card{background:var(--panel);border-radius:24px;padding:40px 36px;box-shadow:0 8px 40px var(--shadow);text-align:center;width:320px;}
    .join-card h1{font-family:var(--font-h);font-size:24px;color:var(--primary);margin-bottom:8px;}
    .join-card p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.7;}
    .join-input{width:100%;padding:12px 16px;border:2px solid #d0e0f5;border-radius:50px;font-family:var(--font-h);font-size:18px;text-align:center;color:var(--text);margin-bottom:12px;}
    .join-input:focus{outline:none;border-color:var(--primary);}
    .join-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:50px;font-family:var(--font-h);font-size:18px;cursor:pointer;}
    .join-hint{font-size:12px;color:var(--muted);margin-top:12px;}

    /* 툴바 */
    #toolbar{background:var(--panel);border-bottom:2px solid #e0eaf5;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:100;box-shadow:0 2px 8px var(--shadow);}
    #toolbar h1{font-family:var(--font-h);font-size:17px;color:var(--primary);}
    .tb-btn{padding:6px 13px;border:none;border-radius:50px;font-family:var(--font-h);font-size:13px;cursor:pointer;transition:transform .12s;}
    .tb-btn:active{transform:scale(.95);}
    .tb-btn-add{background:var(--primary);color:#fff;}
    .tb-btn-check{background:var(--ending);color:#fff;}
    .tb-btn-save{background:#2d6a4f;color:#fff;}
    .tb-btn-load{background:#5a3e8a;color:#fff;}
    .tb-btn-clear{background:#e0e8f0;color:var(--text);}
    #team-badge{background:#e8f0ff;color:var(--primary);font-family:var(--font-h);font-size:13px;padding:4px 12px;border-radius:50px;border:1.5px solid #c0d4f5;}
    #online-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
    #online-dot{width:8px;height:8px;border-radius:50%;background:#ccc;}
    #online-dot.on{background:var(--start);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    #save-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
    #save-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s;}
    #save-dot.saved{background:var(--start);}
    #save-dot.changed{background:#f0a000;}
    .legend{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
    .legend-dot{width:10px;height:10px;border-radius:50%;}

    /* 캔버스 */
    #canvas-wrap{flex:1;position:relative;overflow:hidden;background:radial-gradient(circle,#c8d8f022 1px,transparent 1px);background-size:28px 28px;touch-action:none;}
    #canvas{position:absolute;top:0;left:0;min-width:2800px;min-height:1600px;transform-origin:0 0;will-change:transform;}
    svg#arrows{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

    /* 카드 */
    .scene-card{
      position:absolute;width:200px;
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:0 4px 16px var(--shadow);
      border:2.5px solid #b0cce8;
      cursor:grab;user-select:none;overflow:hidden;touch-action:none;
    }
    .scene-card.dragging{box-shadow:0 12px 32px rgba(0,0,0,.2);cursor:grabbing;z-index:999;}
    .scene-card.type-start {border-color:var(--start);}
    .scene-card.type-ending{border-color:var(--ending);}
    .scene-card.type-normal{border-color:#b0cce8;}
    .scene-card.highlight{box-shadow:0 0 0 3px var(--primary),0 8px 24px var(--shadow);}
    .scene-card.error-card{border-color:#f0a000!important;background:#fffbe8;}

    .card-header{display:flex;align-items:center;justify-content:space-between;padding:7px 8px 4px;}
    .card-num-badge{font-family:var(--font-h);font-size:12px;padding:2px 8px;border-radius:50px;color:#fff;cursor:pointer;title:'번호 클릭해서 변경';}
    .type-start  .card-num-badge{background:var(--start);}
    .type-ending .card-num-badge{background:var(--ending);}
    .type-normal .card-num-badge{background:var(--primary);}
    .card-delete{width:20px;height:20px;border:none;background:#ffe0e0;color:#c00;border-radius:50%;font-size:11px;cursor:pointer;line-height:20px;text-align:center;padding:0;flex-shrink:0;}

    .card-body{padding:0 8px 8px;}
    .card-field-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
    .card-textarea{
      width:100%;border:1.5px solid #d0e0f5;border-radius:8px;
      padding:5px 7px;font-family:var(--font-b);font-size:12px;
      color:var(--text);background:#f8fbff;
      resize:vertical;min-height:56px;line-height:1.5;
      margin-bottom:6px;
    }
    .card-textarea:focus{outline:none;border-color:var(--primary);background:#fff;}

    /* 종류 선택 */
    .card-type-row{display:flex;gap:3px;margin-bottom:8px;}
    .type-radio{display:none;}
    .type-label{flex:1;text-align:center;padding:3px 0;border-radius:6px;font-size:11px;cursor:pointer;border:1.5px solid #dde8f5;color:var(--muted);}
    .type-radio:checked+.type-label{color:#fff;border-color:transparent;}
    .type-radio[value="start"]:checked +.type-label{background:var(--start);}
    .type-radio[value="normal"]:checked+.type-label{background:var(--primary);}
    .type-radio[value="ending"]:checked+.type-label{background:var(--ending);}

    /* 연결 포트 영역 */
    .card-ports{padding:0 8px 8px;display:flex;flex-direction:column;gap:5px;}
    .port-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
    .port-label{flex:1;}
    .port-dot{
      width:28px;height:28px;border-radius:50%;
      cursor:crosshair;flex-shrink:0;
      border:3px solid #fff;
      box-shadow:0 0 0 2px currentColor;
      transition:transform .1s;
      touch-action:none;
    }
    .port-dot:hover{transform:scale(1.2);}
    .port-dot:active{transform:scale(1.3);}
    .port-dot.A{color:var(--choiceA);background:var(--choiceA);}
    .port-dot.B{color:var(--choiceB);background:var(--choiceB);}

    /* 구조 검사 패널 */
    #check-panel{display:none;position:fixed;bottom:20px;right:20px;width:280px;background:var(--panel);border-radius:16px;box-shadow:0 8px 32px var(--shadow);padding:16px 18px;z-index:200;border:2px solid #e0eaf5;max-height:340px;overflow-y:auto;}
    #check-panel h3{font-family:var(--font-h);font-size:16px;margin-bottom:10px;}
    .check-ok{color:var(--start);font-weight:700;}
    .check-warn{color:#e08000;}
    .check-error{color:var(--ending);}
    .check-item{font-size:13px;margin-bottom:6px;padding:6px 8px;border-radius:8px;background:#f8fbff;}
    #check-close{margin-top:10px;width:100%;padding:7px;background:#eef3ff;border:none;border-radius:50px;font-family:var(--font-h);font-size:14px;cursor:pointer;}

    /* 연결 중 임시 선 */
    #temp-line{pointer-events:none;}
  </style>
</head>
<body>

<!-- 입장 화면 -->
<div id="join-screen">
  <div class="join-card">
    <div style="font-size:48px;margin-bottom:8px">🌿</div>
    <h1>가지 프로그램</h1>
    <p>팀 이름을 입력하면<br>팀원과 함께 실시간으로 작업해요!</p>
    <input id="join-input" class="join-input" placeholder="예: 2모둠" maxlength="20"
      onkeydown="if(event.key==='Enter')joinTeam()"/>
    <button class="join-btn" onclick="joinTeam()">입장하기 →</button>
    <div class="join-hint">⚠️ 같은 팀은 똑같은 팀 이름으로 입장하세요</div>
    <button onclick="openAdmin()"
      style="background:none;border:none;font-size:11px;color:#ccc;cursor:pointer;margin-top:16px;padding:4px;">
      🔒 관리자
    </button>
  </div>
</div>

<!-- 툴바 -->
<div id="toolbar">
  <h1>🌿 가지</h1>
  <div id="team-badge">👥 <span id="team-label">-</span></div>
  <div id="online-badge"><div id="online-dot"></div><span id="online-label">연결 중...</span></div>
  <button class="tb-btn tb-btn-add" onclick="addScene()">＋ 장면 추가</button>
  <button class="tb-btn tb-btn-check" onclick="checkStructure()">🔍 구조 검사</button>
  <button class="tb-btn tb-btn-save" onclick="exportJSON()">💾 파일 저장</button>
  <button class="tb-btn tb-btn-load" onclick="document.getElementById('file-input').click()">📂 불러오기</button>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="importJSON(event)"/>
  <button class="tb-btn tb-btn-clear" onclick="clearAll()">🗑 초기화</button>
  <button class="tb-btn" onclick="showHelp()" style="background:#f0f4ff;color:var(--primary);border:1.5px solid var(--primary)">❓</button>
  <div style="display:flex;align-items:center;gap:4px;background:#f0f4ff;border-radius:50px;padding:3px 8px;border:1.5px solid #d0e0f5;">
    <button onclick="setZoom(zoom-0.1)" style="border:none;background:none;font-size:16px;cursor:pointer;line-height:1;color:var(--primary);font-weight:bold;">−</button>
    <span id="zoom-label" style="font-family:var(--font-h);font-size:12px;color:var(--primary);min-width:36px;text-align:center;">100%</span>
    <button onclick="setZoom(zoom+0.1)" style="border:none;background:none;font-size:16px;cursor:pointer;line-height:1;color:var(--primary);font-weight:bold;">＋</button>
    <button onclick="setZoom(1)" style="border:none;background:none;font-size:11px;cursor:pointer;color:var(--muted);">↺</button>
  </div>
  <div class="legend">
    <div id="save-status"><div id="save-dot"></div><span id="save-label">-</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--start)"></div>시작</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div>일반</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ending)"></div>엔딩</div>
  </div>
</div>

<!-- 캔버스 -->
<div id="canvas-wrap">
  <div id="canvas">
    <svg id="arrows">
      <defs>
        <marker id="ahA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#4a90d9"/>
        </marker>
        <marker id="ahB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#ef476f"/>
        </marker>
      </defs>
      <line id="temp-line" x1="0" y1="0" x2="0" y2="0" stroke="#888" stroke-width="2" stroke-dasharray="6,4" display="none"/>
    </svg>
  </div>
</div>

<!-- 구조 검사 패널 -->
<div id="check-panel">
  <h3>🔍 구조 검사 결과</h3>
  <div id="check-result"></div>
  <button id="check-close" onclick="document.getElementById('check-panel').style.display='none'">닫기</button>
</div>

<script>
/* ── Firebase ── */
const firebaseConfig = {
  apiKey:            "AIzaSyBK12nBkj6Pdwu-zpL3w0krU1PzS78McmE",
  authDomain:        "picturebook-8731f.firebaseapp.com",
  databaseURL:       "https://picturebook-8731f-default-rtdb.firebaseio.com",
  projectId:         "picturebook-8731f",
  storageBucket:     "picturebook-8731f.firebasestorage.app",
  messagingSenderId: "590974087190",
  appId:             "1:590974087190:web:a9e9ba15adf020ff470537"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ── 상태 ── */
let scenes   = {};   // { num: {num, title, type, x, y, choiceA, choiceB} }
let teamName = '';
let dbRef    = null;
let isRemote = false;
let dragState= null;   // 카드 드래그
let connState= null;   // 연결선 드래그
let pushTimer= null;
let nextNum  = 1;
let zoom     = 1;   // 줌 레벨 (0.3 ~ 2.0)

/* ── 팀 입장 ── */
function joinTeam() {
  const val = document.getElementById('join-input').value.trim();
  if (!val) { alert('팀 이름을 입력해주세요!'); return; }
  teamName = val;
  document.getElementById('team-label').textContent = teamName;
  document.getElementById('join-screen').classList.add('hidden');

  dbRef = db.ref('teams/' + encodeURIComponent(teamName) + '/scenes');
  dbRef.on('value', snapshot => {
    isRemote = true;
    scenes   = snapshot.val() || {};
    // nextNum 동기화
    const nums = Object.keys(scenes).map(Number);
    if (nums.length) nextNum = Math.max(...nums) + 1;
    renderAll();
    isRemote = false;
    setSaveStatus('saved');
  });

  db.ref('.info/connected').on('value', snap => {
    const on = snap.val() === true;
    document.getElementById('online-dot').className = on ? 'on' : '';
    document.getElementById('online-label').textContent = on ? teamName+' 연결됨 🟢' : '연결 끊김 🔴';
  });
}

/* ── Firebase 저장 ── */
function pushToFirebase() {
  if (isRemote || !dbRef) return;
  setSaveStatus('changed');
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => {
    dbRef.set(scenes)
      .then(()  => setSaveStatus('saved'))
      .catch(() => setSaveStatus('error'));
  }, 600);
}

function setSaveStatus(s) {
  const dot = document.getElementById('save-dot');
  const lbl = document.getElementById('save-label');
  if (s==='saved') {
    dot.className='saved';
    const t=new Date();
    lbl.textContent=`저장됨 ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
  } else if (s==='changed') {
    dot.className='changed'; lbl.textContent='저장 중...';
  } else { dot.className=''; lbl.textContent='-'; }
}

/* ── 장면 추가 (버튼 클릭 → 바로 카드 등장) ── */
function addScene() {
  // 번호 자동 배정
  while (scenes[nextNum]) nextNum++;
  const num = nextNum++;

  // 위치: 캔버스 중앙 근처에 살짝 랜덤
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = rect.width/2 + (Math.random()-0.5)*160;
  const cy = rect.height/2 + (Math.random()-0.5)*100;
  const cv = toCanvas(rect.left + cx, rect.top + cy);
  const x = Math.max(20, cv.x);
  const y = Math.max(20, cv.y);

  scenes[num] = { num, title:'', type:'normal', x, y, choiceA:'', choiceB:'' };
  renderCard(scenes[num]);
  drawArrows();
  pushToFirebase();
}

/* ── 전체 렌더 ── */
function renderAll() {
  document.querySelectorAll('.scene-card').forEach(el => el.remove());
  Object.values(scenes).forEach(s => renderCard(s));
  drawArrows();
}

/* ── 카드 렌더 ── */
function renderCard(s) {
  // 기존 카드 제거 후 재생성
  document.getElementById('card-'+s.num)?.remove();

  const el = document.createElement('div');
  el.className = `scene-card type-${s.type}`;
  el.id = `card-${s.num}`;
  el.style.left = s.x + 'px';
  el.style.top  = s.y + 'px';

  // 종류 라디오
  const types=['start','normal','ending'], labels=['시작','일반','엔딩'];
  const radios = types.map((t,i)=>
    `<input class="type-radio" type="radio" name="type-${s.num}" id="tr-${s.num}-${t}"
       value="${t}" ${s.type===t?'checked':''} onchange="updateType(${s.num},'${t}')">
     <label class="type-label" for="tr-${s.num}-${t}">${labels[i]}</label>`
  ).join('');

  // 연결 포트 (엔딩이 아닐 때)
  let portsHTML = '';
  if (s.type !== 'ending') {
    const aLabel = s.choiceA || '선택지 A';
    const bLabel = s.choiceB || '선택지 B';
    portsHTML = `
      <div class="card-ports">
        <div class="port-row">
          <input class="port-label-input" placeholder="선택지 A" value="${s.choiceA||''}"
            style="flex:1;min-width:0;border:1.5px solid #d0e0f5;border-radius:6px;padding:2px 5px;font-size:11px;font-family:var(--font-b);"
            onchange="updateChoiceLabel(${s.num},'A',this.value)"/>
          <div class="port-dot A" data-num="${s.num}" data-port="A" title="드래그해서 연결"></div>
        </div>
        <div class="port-row">
          <input class="port-label-input" placeholder="선택지 B" value="${s.choiceB||''}"
            style="flex:1;min-width:0;border:1.5px solid #d0e0f5;border-radius:6px;padding:2px 5px;font-size:11px;font-family:var(--font-b);"
            onchange="updateChoiceLabel(${s.num},'B',this.value)"/>
          <div class="port-dot B" data-num="${s.num}" data-port="B" title="드래그해서 연결"></div>
        </div>
      </div>`;
  } else {
    portsHTML = `<div style="text-align:center;font-size:12px;color:var(--ending);padding:4px 8px 8px;">🏁 이야기 끝</div>`;
  }

  el.innerHTML = `
    <div class="card-header">
      <span class="card-num-badge" onclick="renameScene(${s.num})" title="번호 바꾸기">장면 ${s.num}</span>
      <button class="card-delete" onclick="deleteScene(${s.num})">✕</button>
    </div>
    <div class="card-body">
      <div class="card-field-label">장면</div>
      <textarea class="card-textarea" placeholder="장면 내용을 여러 줄로 써보세요"
        onchange="updateTitle(${s.num},this.value)">${s.title||''}</textarea>
      <div class="card-type-row">${radios}</div>
    </div>
    ${portsHTML}`;

  // 카드 드래그
  // Pointer Events로 카드 드래그 처리 (마우스+터치 통합)
  el.addEventListener('pointerdown', e => {
    if (['INPUT','BUTTON','LABEL','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.target.classList.contains('port-dot')) return;
    e.preventDefault();
    e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    const cv = toCanvas(e.clientX, e.clientY);
    dragState = { num: s.num, ox: s.x - cv.x, oy: s.y - cv.y };
    el.classList.add('dragging');
  });
  el.addEventListener('pointermove', e => {
    if (!dragState || dragState.num !== s.num) return;
    e.preventDefault();
    const sc = scenes[dragState.num];
    const cv = toCanvas(e.clientX, e.clientY);
    sc.x = Math.max(0, cv.x + dragState.ox);
    sc.y = Math.max(0, cv.y + dragState.oy);
    el.style.left = sc.x + 'px';
    el.style.top  = sc.y + 'px';
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => { drawArrows(); rafId = null; });
  });
  el.addEventListener('pointerup', e => {
    if (!dragState || dragState.num !== s.num) return;
    el.classList.remove('dragging');
    dragState = null;
    pushToFirebase();
  });

  // 포트 드래그 (연결선) — Pointer Events
  el.querySelectorAll('.port-dot').forEach(dot => {
    dot.style.touchAction = 'none';
    dot.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      dot.setPointerCapture(e.pointerId);
      const num  = parseInt(dot.dataset.num);
      const port = dot.dataset.port;
      const sc   = scenes[num];
      const startX = sc.x + 200;
      const startY = sc.y + (port==='A' ? 120 : 140);
      connState = { fromNum: num, port };
      const tl = document.getElementById('temp-line');
      tl.setAttribute('display','');
      tl.setAttribute('stroke', port==='A' ? '#4a90d9' : '#ef476f');
      tl.setAttribute('x1', startX); tl.setAttribute('y1', startY);
      tl.setAttribute('x2', startX); tl.setAttribute('y2', startY);
    });
    dot.addEventListener('pointermove', e => {
      if (!connState) return;
      e.preventDefault();
      const cv = toCanvas(e.clientX, e.clientY);
      const tl = document.getElementById('temp-line');
      tl.setAttribute('x2', cv.x);
      tl.setAttribute('y2', cv.y);
      document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('highlight'));
      const target = getCardAt(e.clientX, e.clientY);
      if (target && target !== connState.fromNum) {
        document.getElementById('card-'+target)?.classList.add('highlight');
      }
    });
    dot.addEventListener('pointerup', e => {
      if (!connState) return;
      document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('highlight'));
      document.getElementById('temp-line').setAttribute('display','none');
      const target = getCardAt(e.clientX, e.clientY);
      if (target && target !== connState.fromNum) connect(connState.fromNum, connState.port, target);
      connState = null;
    });
  });

  document.getElementById('canvas').appendChild(el);
}

/* ================================================================
   터치 & 마우스 통합 처리
   ================================================================ */

// 캔버스 팬(이동) 상태
let panState  = null;  // { lastX, lastY }
// 핀치줌 상태
let pinchState = null; // { dist, zoom }
// 캔버스 오프셋 (팬용)
let canvasOffX = 0, canvasOffY = 0;

function getCanvas() { return document.getElementById('canvas'); }
function getWrap()   { return document.getElementById('canvas-wrap'); }

/* 캔버스 transform 적용 */
function applyTransform() {
  getCanvas().style.transform = `translate(${canvasOffX}px,${canvasOffY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom*100)+'%';
}

/* 두 터치 사이 거리 */
function getTouchDist(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

/* 화면 좌표 → 캔버스 좌표 */
function toCanvas(clientX, clientY) {
  const wrap = getWrap();
  const rect = wrap.getBoundingClientRect();
  return {
    x: (clientX - rect.left - canvasOffX) / zoom,
    y: (clientY - rect.top  - canvasOffY) / zoom
  };
}

/* ── 카드 드래그 시작 ── */
function onCardMouseDown(e, num) {
  const tag = e.target.tagName;
  if (['INPUT','BUTTON','LABEL','TEXTAREA'].includes(tag)) return;
  if (e.target.classList.contains('port-dot')) return;
  e.preventDefault();
  e.stopPropagation();
  const s  = scenes[num];
  const pt = e.touches ? e.touches[0] : e;
  const cv = toCanvas(pt.clientX, pt.clientY);
  dragState = { num, ox: s.x - cv.x, oy: s.y - cv.y };
  document.getElementById('card-'+num).classList.add('dragging');
}

/* ── 포트 드래그 시작 ── */
function onPortMouseDown(e) {
  if(e.stopPropagation) e.stopPropagation();
  if(e.preventDefault) e.preventDefault();
  const dot  = e.currentTarget || e.target;
  const num  = parseInt(dot.dataset ? dot.dataset.num : dot.getAttribute('data-num'));
  const port = dot.dataset ? dot.dataset.port : dot.getAttribute('data-port');
  const s    = scenes[num];
  const startX = s.x + 200;
  const startY = s.y + (port==='A' ? 120 : 140);
  connState = { fromNum: num, port };
  const tl = document.getElementById('temp-line');
  tl.setAttribute('display','');
  tl.setAttribute('stroke', port==='A' ? '#4a90d9' : '#ef476f');
  tl.setAttribute('x1', startX); tl.setAttribute('y1', startY);
  tl.setAttribute('x2', startX); tl.setAttribute('y2', startY);
}

/* ── 공통 move 처리 ── */
let rafId = null;
function onPointerMove(clientX, clientY) {
  if (dragState) {
    const s = scenes[dragState.num];
    const cv = toCanvas(clientX, clientY);
    s.x = Math.max(0, cv.x + dragState.ox);
    s.y = Math.max(0, cv.y + dragState.oy);
    const el = document.getElementById('card-'+dragState.num);
    if (el) { el.style.left=s.x+'px'; el.style.top=s.y+'px'; }
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => { drawArrows(); rafId=null; });
  }
  if (connState) {
    const cv = toCanvas(clientX, clientY);
    const tl = document.getElementById('temp-line');
    tl.setAttribute('x2', cv.x);
    tl.setAttribute('y2', cv.y);
    document.querySelectorAll('.scene-card').forEach(el => el.classList.remove('highlight'));
    const target = getCardAt(clientX, clientY);
    if (target && target !== connState.fromNum) {
      document.getElementById('card-'+target)?.classList.add('highlight');
    }
  }
}

function onPointerUp(clientX, clientY) {
  if (dragState) {
    document.getElementById('card-'+dragState.num)?.classList.remove('dragging');
    dragState = null;
    pushToFirebase();
  }
  if (connState) {
    document.querySelectorAll('.scene-card').forEach(el => el.classList.remove('highlight'));
    document.getElementById('temp-line').setAttribute('display','none');
    const target = getCardAt(clientX, clientY);
    if (target && target !== connState.fromNum) connect(connState.fromNum, connState.port, target);
    connState = null;
  }
}

/* ── 마우스: 배경 팬 ── */
getWrap().addEventListener('mousedown', e => {
  if (e.target === getWrap() || e.target === getCanvas() || e.target.id === 'arrows') {
    panState = { lastX: e.clientX, lastY: e.clientY };
  }
});
document.addEventListener('mousemove', e => {
  if (!panState) return;
  canvasOffX += e.clientX - panState.lastX;
  canvasOffY += e.clientY - panState.lastY;
  panState.lastX = e.clientX;
  panState.lastY = e.clientY;
  applyTransform();
});
document.addEventListener('mouseup', () => { panState = null; });

/* ── Ctrl+휠 줌 ── */
getWrap().addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const oldZoom = zoom;
  zoom = Math.min(2.0, Math.max(0.3, Math.round((zoom + (e.deltaY<0?0.1:-0.1))*10)/10));
  // 마우스 위치 기준 줌
  const wrap = getWrap();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  canvasOffX = mx - (mx - canvasOffX) * (zoom / oldZoom);
  canvasOffY = my - (my - canvasOffY) * (zoom / oldZoom);
  applyTransform();
}, {passive:false});

/* ── 터치: 핀치줌 + 배경 팬 ── */
getWrap().addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    panState = null;
    pinchState = {
      dist: getTouchDist(e.touches), zoom,
      offX: canvasOffX, offY: canvasOffY,
      midX: (e.touches[0].clientX+e.touches[1].clientX)/2,
      midY: (e.touches[0].clientY+e.touches[1].clientY)/2
    };
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (!el || (!el.closest('.scene-card'))) {
      e.preventDefault();
      panState = { lastX: t.clientX, lastY: t.clientY };
    }
  }
}, {passive:false});

getWrap().addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && pinchState) {
    const newDist = getTouchDist(e.touches);
    zoom = Math.min(2.0, Math.max(0.3, pinchState.zoom * newDist / pinchState.dist));
    zoom = Math.round(zoom * 100) / 100;
    const rect = getWrap().getBoundingClientRect();
    const mx = pinchState.midX - rect.left;
    const my = pinchState.midY - rect.top;
    canvasOffX = mx - (mx - pinchState.offX) * (zoom / pinchState.zoom);
    canvasOffY = my - (my - pinchState.offY) * (zoom / pinchState.zoom);
    applyTransform();
    return;
  }
  if (e.touches.length === 1 && panState) {
    const t = e.touches[0];
    canvasOffX += t.clientX - panState.lastX;
    canvasOffY += t.clientY - panState.lastY;
    panState.lastX = t.clientX;
    panState.lastY = t.clientY;
    applyTransform();
  }
}, {passive:false});

getWrap().addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchState = null;
  if (e.touches.length === 0) panState = null;
}, {passive:false});

/* ── 연결 처리 ── */
function connect(fromNum, port, toNum) {
  const s = scenes[fromNum];
  if (!s) return;
  if (port === 'A') s.nextA = toNum;
  else              s.nextB = toNum;
  renderCard(s);
  drawArrows();
  pushToFirebase();
}

/* ── 어느 카드 위에 있는지 판별 ── */
function getCardAt(clientX, clientY) {
  const els = document.elementsFromPoint(clientX, clientY);
  for (const el of els) {
    if (el.classList.contains('scene-card')) {
      return parseInt(el.id.replace('card-',''));
    }
  }
  return null;
}

/* ── 화살표 그리기 ── */
function drawArrows() {
  const svg = document.getElementById('arrows');
  // 기존 path/text 제거 (defs, temp-line 유지)
  svg.querySelectorAll('path.arrow, text.arrow-label, rect.arrow-label').forEach(el => el.remove());

  Object.values(scenes).forEach(s => {
    drawArrow(svg, s, 'A');
    drawArrow(svg, s, 'B');
  });
}

function drawArrow(svg, s, port) {
  const nextKey = port==='A' ? 'nextA' : 'nextB';
  const next = s[nextKey];
  if (!next || !scenes[next]) return;
  const t = scenes[next];

  const x1 = s.x + 200;
  const y1 = s.y + (port==='A' ? 120 : 140);
  const x2 = t.x;
  const y2 = t.y + 50;
  const cx = (x1+x2)/2;
  const color = port==='A' ? '#4a90d9' : '#ef476f';
  const markerId = port==='A' ? 'ahA' : 'ahB';
  const label = port==='A' ? (s.choiceA||'A') : (s.choiceB||'B');

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('class','arrow');
  path.setAttribute('d',`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',color);
  path.setAttribute('stroke-width','2');
  path.setAttribute('marker-end',`url(#${markerId})`);
  path.setAttribute('opacity','0.85');
  svg.appendChild(path);

  // 라벨을 시작점(포트) 근처에 고정 배치 — 세로 눕힘 방지
  if (label && label !== 'A' && label !== 'B') {
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    const lx = x1 + 6, ly = y1 - 16, lw = Math.min(label.length * 8 + 8, 80), lh = 16;
    bg.setAttribute('class','arrow-label');
    bg.setAttribute('x', lx); bg.setAttribute('y', ly);
    bg.setAttribute('width', lw); bg.setAttribute('height', lh);
    bg.setAttribute('rx', '8'); bg.setAttribute('fill', color);
    bg.setAttribute('opacity', '0.18');
    svg.appendChild(bg);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('class','arrow-label');
    txt.setAttribute('x', lx + lw/2);
    txt.setAttribute('y', ly + 11);
    txt.setAttribute('font-size','10');
    txt.setAttribute('fill', color);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-family','Nanum Gothic,sans-serif');
    txt.setAttribute('font-weight','bold');
    txt.textContent = label.length > 9 ? label.slice(0,9)+'…' : label;
    svg.appendChild(txt);
  }
}

/* ── 데이터 업데이트 ── */
function updateTitle(num, val) {
  if (!scenes[num]) return;
  scenes[num].title = val;
  pushToFirebase();
}

function updateType(num, type) {
  if (!scenes[num]) return;
  scenes[num].type = type;
  renderCard(scenes[num]);
  drawArrows();
  pushToFirebase();
}

function updateChoiceLabel(num, port, val) {
  if (!scenes[num]) return;
  if (port==='A') scenes[num].choiceA = val;
  else            scenes[num].choiceB = val;
  drawArrows();
  pushToFirebase();
}

/* ── 번호 바꾸기 ── */
function renameScene(num) {
  const newNum = parseInt(prompt(`장면 번호를 바꿀까요?\n현재: ${num}\n새 번호:`, num));
  if (!newNum || newNum === num) return;
  if (scenes[newNum]) { alert(`장면 ${newNum}은 이미 있어요!`); return; }

  // 연결된 번호도 업데이트
  const s = { ...scenes[num], num: newNum };
  delete scenes[num];
  scenes[newNum] = s;

  Object.values(scenes).forEach(sc => {
    if (sc.nextA === num) sc.nextA = newNum;
    if (sc.nextB === num) sc.nextB = newNum;
  });

  renderAll();
  pushToFirebase();
}

/* ── 삭제 ── */
function deleteScene(num) {
  if (!confirm(`장면 ${num}을 삭제할까요?`)) return;
  delete scenes[num];
  // 연결 정리
  Object.values(scenes).forEach(s => {
    if (s.nextA === num) s.nextA = '';
    if (s.nextB === num) s.nextB = '';
  });
  renderAll();
  pushToFirebase();
}

function clearAll() {
  if (!confirm('모든 장면을 지울까요?')) return;
  scenes = {}; nextNum = 1;
  renderAll(); pushToFirebase();
}

/* ── 파일 저장/불러오기 ── */
function exportJSON() {
  const data = { teamName, savedAt: new Date().toISOString(), scenes };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `가지구조_${teamName}_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importJSON(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      scenes = data.scenes || data;
      const fixed = {}; Object.values(scenes).forEach(s=>{fixed[s.num]=s;}); scenes=fixed;
      const nums = Object.keys(scenes).map(Number);
      if (nums.length) nextNum = Math.max(...nums)+1;
      renderAll(); pushToFirebase();
      alert(`✅ "${file.name}" 불러오기 완료!`);
    } catch { alert('❌ 올바른 가지 파일이 아니에요.'); }
  };
  reader.readAsText(file); e.target.value='';
}

/* ── 구조 검사 ── */
function checkStructure() {
  const panel  = document.getElementById('check-panel');
  const result = document.getElementById('check-result');
  panel.style.display = 'block';
  const items = [];
  document.querySelectorAll('.scene-card').forEach(el=>el.classList.remove('error-card'));

  if (!Object.keys(scenes).length) {
    result.innerHTML='<div class="check-item check-warn">⚠️ 장면이 없어요.</div>'; return;
  }

  const starts  = Object.values(scenes).filter(s=>s.type==='start');
  const endings = Object.values(scenes).filter(s=>s.type==='ending');

  if (!starts.length)       items.push({cls:'check-error',msg:'❌ 시작 장면이 없어요!'});
  else if (starts.length>1) items.push({cls:'check-warn', msg:`⚠️ 시작 장면이 ${starts.length}개예요.`});
  else                      items.push({cls:'check-ok',   msg:'✅ 시작: 장면 '+starts[0].num});

  if (!endings.length) items.push({cls:'check-error',msg:'❌ 엔딩 장면이 없어요!'});
  else items.push({cls:'check-ok',msg:`✅ 엔딩: ${endings.length}개 (${endings.map(e=>e.num).join(', ')})`});

  // 연결 안 된 일반 장면
  const noConn = Object.values(scenes).filter(s=>
    s.type==='normal' && !s.nextA && !s.nextB);
  if (noConn.length) {
    items.push({cls:'check-warn',msg:`⚠️ 연결 없는 장면: ${noConn.map(s=>s.num).join(', ')}`});
    noConn.forEach(s=>document.getElementById('card-'+s.num)?.classList.add('error-card'));
  } else {
    items.push({cls:'check-ok',msg:'✅ 모든 장면 연결됨'});
  }

  // 없는 장면으로 연결된 경우
  const broken=[];
  Object.values(scenes).forEach(s=>{
    if (s.nextA && !scenes[s.nextA]) broken.push(`장면 ${s.num} A → 없는 장면 ${s.nextA}`);
    if (s.nextB && !scenes[s.nextB]) broken.push(`장면 ${s.num} B → 없는 장면 ${s.nextB}`);
  });
  if (broken.length) broken.forEach(b=>items.push({cls:'check-error',msg:'❌ '+b}));

  result.innerHTML = items.map(i=>`<div class="check-item ${i.cls}">${i.msg}</div>`).join('');
}

/* ── 줌 ── */
function setZoom(val) {
  zoom = Math.min(2.0, Math.max(0.3, Math.round(val * 10) / 10));
  applyTransform();
}

// 마우스 휠로 줌
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return; // Ctrl+휠만 줌
  e.preventDefault();
  setZoom(zoom + (e.deltaY < 0 ? 0.1 : -0.1));
}, {passive:false});

        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <span style="font-size:11px;background:#d4f5e8;color:#1a6b4a;padding:2px 10px;border-radius:50px;">시작 ${starts}개</span>
          <span style="font-size:11px;background:#ddeeff;color:#2255aa;padding:2px 10px;border-radius:50px;">일반 ${normals}개</span>
          <span style="font-size:11px;background:#ffe0e8;color:#aa2244;padding:2px 10px;border-radius:50px;">엔딩 ${endings}개</span>
        </div>
        <div id="detail-${encodedName}" style="display:none;margin-top:10px;"></div>
      `;
      list.appendChild(card);
    });
  }).catch(err => {
    list.innerHTML = `<div style="color:#ef476f;padding:12px;">오류: ${err.message}</div>`;
  });
}

function toggleTeamDetail(encodedName) {
  const detail = document.getElementById('detail-' + encodedName);
  if (detail.style.display !== 'none') { detail.style.display = 'none'; return; }

  db.ref('teams/' + encodedName + '/scenes').once('value').then(snap => {
    const scenes = snap.val() || {};
    const arr = Object.values(scenes).sort((a,b)=>a.num-b.num);
    if (!arr.length) { detail.innerHTML='<div style="color:var(--muted);font-size:12px;">장면 없음</div>'; }
    else {
      detail.innerHTML = `
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">장면 목록</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${arr.map(s => {
            const color = s.type==='start'?'#06d6a0':s.type==='ending'?'#ef476f':'#4a90d9';
            const nextInfo = [];
            if (s.nextA) nextInfo.push('A→'+s.nextA);
            if (s.nextB) nextInfo.push('B→'+s.nextB);
            return `<div style="background:#fff;border:1.5px solid ${color};border-radius:10px;padding:6px 10px;font-size:11px;min-width:80px;">
              <div style="font-family:var(--font-h);color:${color};">장면 ${s.num}</div>
              <div style="color:var(--text);margin:2px 0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.title||'(내용 없음)'}</div>
              ${nextInfo.length ? `<div style="color:var(--muted);">${nextInfo.join(' ')}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
    }
    detail.style.display = 'block';
  });
}

function deleteTeam(encodedName, displayName) {
  if (!confirm(`"${displayName}" 모둠의 모든 데이터를 삭제할까요?\n이 작업은 되돌릴 수 없어요!`)) return;
  db.ref('teams/' + encodedName).remove().then(() => {
    alert(`✅ "${displayName}" 모둠 데이터가 삭제됐어요.`);
    loadAdminData();
  }).catch(err => alert('❌ 삭제 실패: ' + err.message));
}

</script>

<!-- 관리자 비밀번호 모달 -->
<div id="admin-pw-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:32px 28px;width:300px;box-shadow:0 16px 48px rgba(0,0,0,.25);text-align:center;">
    <div style="font-size:36px;margin-bottom:8px">🔒</div>
    <h2 style="font-family:var(--font-h);font-size:20px;color:var(--primary);margin-bottom:16px;">관리자 확인</h2>
    <input id="admin-pw-input" type="password" placeholder="비밀번호 입력"
      style="width:100%;padding:10px 14px;border:2px solid #d0e0f5;border-radius:50px;font-size:16px;text-align:center;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')checkAdminPw()"/>
    <div style="display:flex;gap:8px;">
      <button onclick="document.getElementById('admin-pw-modal').style.display='none'"
        style="flex:1;padding:10px;background:#eef3ff;border:none;border-radius:50px;font-family:var(--font-h);font-size:15px;cursor:pointer;">취소</button>
      <button onclick="checkAdminPw()"
        style="flex:1;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:50px;font-family:var(--font-h);font-size:15px;cursor:pointer;">확인</button>
    </div>
    <div id="admin-pw-err" style="color:#ef476f;font-size:12px;margin-top:8px;"></div>
  </div>
</div>

<!-- 관리자 패널 -->
<div id="admin-panel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 0;">
  <div style="background:#fff;border-radius:20px;width:100%;max-width:640px;box-shadow:0 16px 48px rgba(0,0,0,.3);overflow:hidden;">
    <!-- 헤더 -->
    <div style="background:var(--primary);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:var(--font-h);font-size:20px;color:#fff;">🛠 관리자 페이지</div>
        <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;">모둠 데이터 관리</div>
      </div>
      <button onclick="closeAdmin()"
        style="background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <!-- 새로고침 -->
    <div style="padding:14px 24px 0;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:var(--muted);" id="admin-team-count">불러오는 중...</span>
      <button onclick="loadAdminData()"
        style="padding:6px 14px;background:#f0f4ff;border:none;border-radius:50px;font-family:var(--font-h);font-size:13px;color:var(--primary);cursor:pointer;">🔄 새로고침</button>
    </div>
    <!-- 모둠 목록 -->
    <div id="admin-team-list" style="padding:12px 24px 24px;"></div>
  </div>
</div>
</body>
</html>
