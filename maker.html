<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>가지 프로그램</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f4f8ff; --panel:#fff; --primary:#4a90d9;
      --start:#06d6a0; --ending:#ef476f; --choiceA:#4a90d9; --choiceB:#ef476f;
      --text:#1e2d3d; --muted:#7a8fa6;
      --shadow:rgba(30,60,100,0.12); --radius:14px;
      --font-h:'Jua',sans-serif; --font-b:'Nanum Gothic',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* 입장 화면 */
    #join-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;z-index:999;overflow-y:auto;padding:20px 0;}
    #join-screen.hidden{display:none;}
    .join-card{background:var(--panel);border-radius:24px;padding:28px 24px;box-shadow:0 8px 40px var(--shadow);text-align:center;width:340px;margin:auto;}
    .join-card h1{font-family:var(--font-h);font-size:24px;color:var(--primary);margin-bottom:8px;}
    .join-card p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.7;}
    .join-input{width:100%;padding:12px 16px;border:2px solid #d0e0f5;border-radius:50px;font-family:var(--font-h);font-size:18px;text-align:center;color:var(--text);margin-bottom:12px;}
    .join-input:focus{outline:none;border-color:var(--primary);}
    .join-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:50px;font-family:var(--font-h);font-size:18px;cursor:pointer;}
    .join-hint{font-size:12px;color:var(--muted);margin-top:12px;}

    /* 툴바 */
    #toolbar{background:var(--panel);border-bottom:2px solid #e0eaf5;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:100;box-shadow:0 2px 8px var(--shadow);}
    #toolbar h1{font-family:var(--font-h);font-size:17px;color:var(--primary);}
    .tb-btn{padding:6px 13px;border:none;border-radius:50px;font-family:var(--font-h);font-size:13px;cursor:pointer;transition:transform .12s;}
    .tb-btn:active{transform:scale(.95);}
    .tb-btn-add{background:var(--primary);color:#fff;}
    .tb-btn-check{background:var(--ending);color:#fff;}
    .tb-btn-save{background:#2d6a4f;color:#fff;}
    .tb-btn-load{background:#5a3e8a;color:#fff;}
    .tb-btn-clear{background:#e0e8f0;color:var(--text);}
    #team-badge{background:#e8f0ff;color:var(--primary);font-family:var(--font-h);font-size:13px;padding:4px 12px;border-radius:50px;border:1.5px solid #c0d4f5;}
    #online-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
    #online-dot{width:8px;height:8px;border-radius:50%;background:#ccc;}
    #online-dot.on{background:var(--start);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    #save-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
    #save-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s;}
    #save-dot.saved{background:var(--start);}
    #save-dot.changed{background:#f0a000;}
    .legend{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
    .legend-dot{width:10px;height:10px;border-radius:50%;}

    /* ── 툴바 UX 정리: 정체성 + 그룹화 ── */
    .tb-identity {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .tb-home-link {
      font-size: 20px;
      text-decoration: none;
      line-height: 1;
      opacity: .85;
      transition: opacity .15s;
    }
    .tb-home-link:hover { opacity: 1; }
    .tb-workspace-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tb-workspace-label {
      font-family: var(--font-h);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .06em;
    }
    .tb-team-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #team-badge-inline {
      font-family: var(--font-h);
      font-size: 14px;
      color: var(--primary);
      background: #e8f0ff;
      padding: 2px 10px;
      border-radius: 50px;
      border: 1.5px solid #c0d4f5;
    }
    #team-badge-inline strong { font-weight: 700; }

    /* 수직 구분선 */
    .tb-divider-v {
      width: 1px;
      height: 32px;
      background: #d0e0f5;
      flex-shrink: 0;
      border-radius: 1px;
    }

    /* 버튼 그룹 */
    .tb-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }
    .tb-group-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-h);
      letter-spacing: .07em;
      padding-left: 2px;
    }
    .tb-group-btns {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── 다음 단계 패널 ── */
    #next-step-panel {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      width: 230px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(30,60,100,0.18), 0 0 0 1.5px #e0eaf5;
      overflow: hidden;
    }
    .nsp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid #edf2f8;
    }
    .nsp-title {
      font-family: var(--font-h);
      font-size: 13px;
      color: var(--primary);
    }
    .nsp-toggle {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 0 2px;
    }
    .nsp-toggle:hover { color: var(--text); }
    .nsp-body { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 6px; }
    .nsp-body.collapsed { display: none; }

    .nsp-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      background: #f4f8ff;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      color: var(--text);
      transition: transform .12s, background .15s, border-color .15s;
    }
    .nsp-btn:hover { transform: translateY(-1px); }
    .nsp-btn:active { transform: scale(.98); }

    .nsp-btn-icon { font-size: 18px; flex-shrink: 0; }
    .nsp-btn-text { display: flex; flex-direction: column; gap: 1px; }
    .nsp-btn-text strong { font-family: var(--font-h); font-size: 13px; color: var(--text); }
    .nsp-btn-text small { font-size: 10px; color: var(--muted); line-height: 1.4; }

    /* 각 버튼 색상 */
    .nsp-btn--preview  { border-color: #b0dfc8; }
    .nsp-btn--preview:hover  { background: #e8faf2; border-color: var(--start); }
    .nsp-btn--preview .nsp-btn-text strong  { color: #1a6b4a; }

    .nsp-btn--viewedit { border-color: #d4b0f0; }
    .nsp-btn--viewedit:hover { background: #f5eeff; border-color: #9b4dca; }
    .nsp-btn--viewedit .nsp-btn-text strong { color: #7030a0; }

    .nsp-btn--view     { border-color: #c0d4f5; }
    .nsp-btn--view:hover     { background: #e8f0ff; border-color: var(--primary); }
    .nsp-btn--view .nsp-btn-text strong { color: var(--primary); }

    /* 캔버스 */
    #canvas-wrap{flex:1;position:relative;overflow:hidden;background:radial-gradient(circle,#c8d8f022 1px,transparent 1px);background-size:28px 28px;touch-action:none;}
    #canvas{position:absolute;top:0;left:0;min-width:2800px;min-height:1600px;transform-origin:0 0;will-change:zoom,transform;}
    svg#arrows{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

    /* 카드 */
    .scene-card{position:absolute;width:200px;background:var(--panel);border-radius:var(--radius);box-shadow:0 4px 16px var(--shadow);border:2.5px solid #b0cce8;cursor:grab;user-select:none;overflow:hidden;touch-action:none;}
    .scene-card.dragging{box-shadow:0 12px 32px rgba(0,0,0,.2);cursor:grabbing;z-index:999;}
    .scene-card.type-start {border-color:var(--start);}
    .scene-card.type-ending{border-color:var(--ending);}
    .scene-card.type-normal{border-color:#b0cce8;}
    .scene-card.highlight{box-shadow:0 0 0 3px var(--primary),0 8px 24px var(--shadow);}
    .scene-card.error-card{border-color:#f0a000!important;background:#fffbe8;}

    .card-header{display:flex;align-items:center;justify-content:space-between;padding:7px 8px 4px;}
    .card-num-badge{font-family:var(--font-h);font-size:12px;padding:2px 8px;border-radius:50px;color:#fff;cursor:pointer;}
    .type-start  .card-num-badge{background:var(--start);}
    .type-ending .card-num-badge{background:var(--ending);}
    .type-normal .card-num-badge{background:var(--primary);}
    .card-delete{width:20px;height:20px;border:none;background:#ffe0e0;color:#c00;border-radius:50%;font-size:11px;cursor:pointer;line-height:20px;text-align:center;padding:0;flex-shrink:0;}

    .card-body{padding:0 8px 8px;}
    .card-field-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
    .card-textarea{width:100%;border:1.5px solid #d0e0f5;border-radius:8px;padding:5px 7px;font-family:var(--font-b);font-size:12px;color:var(--text);background:#f8fbff;resize:vertical;min-height:56px;line-height:1.5;margin-bottom:6px;}
    .card-textarea:focus{outline:none;border-color:var(--primary);background:#fff;}

    /* 종류 선택 */
    .card-type-row{display:flex;gap:3px;margin-bottom:8px;}
    .type-radio{display:none;}
    .type-label{flex:1;text-align:center;padding:3px 0;border-radius:6px;font-size:11px;cursor:pointer;border:1.5px solid #dde8f5;color:var(--muted);}
    .type-radio:checked+.type-label{color:#fff;border-color:transparent;}
    .type-radio[value="start"]:checked +.type-label{background:var(--start);}
    .type-radio[value="normal"]:checked+.type-label{background:var(--primary);}
    .type-radio[value="ending"]:checked+.type-label{background:var(--ending);}

    /* 연결 포트 */
    .card-ports{padding:0 8px 8px;display:flex;flex-direction:column;gap:5px;}
    .port-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
    .port-label{flex:1;}
    .port-dot{width:28px;height:28px;border-radius:50%;cursor:crosshair;flex-shrink:0;border:3px solid #fff;box-shadow:0 0 0 2px currentColor;transition:transform .1s;touch-action:none;}
    .port-dot:hover{transform:scale(1.2);}
    .port-dot:active{transform:scale(1.3);}
    .port-dot.A{color:var(--choiceA);background:var(--choiceA);}
    .port-dot.B{color:var(--choiceB);background:var(--choiceB);}

    /* 구조 검사 패널 */
    #check-panel{display:none;position:fixed;bottom:20px;right:20px;width:280px;background:var(--panel);border-radius:16px;box-shadow:0 8px 32px var(--shadow);padding:16px 18px;z-index:200;border:2px solid #e0eaf5;max-height:340px;overflow-y:auto;}
    #check-panel h3{font-family:var(--font-h);font-size:16px;margin-bottom:10px;}
    .check-ok{color:var(--start);font-weight:700;}
    .check-warn{color:#e08000;}
    .check-error{color:var(--ending);}
    .check-item{font-size:13px;margin-bottom:6px;padding:6px 8px;border-radius:8px;background:#f8fbff;}
    #check-close{margin-top:10px;width:100%;padding:7px;background:#eef3ff;border:none;border-radius:50px;font-family:var(--font-h);font-size:14px;cursor:pointer;}

    /* 연결 중 임시 선 */
    #temp-line{pointer-events:none;}

    /* 입문/확장 모드 */
    body.beginner-mode .adv-only{display:none !important;}

    /* 이미지 썸네일 */
    .card-image-area{padding:0 8px 8px;}
    .card-thumb{width:100%;max-height:90px;object-fit:cover;border-radius:8px;border:1.5px solid #d0e0f5;display:block;cursor:pointer;}
    .card-img-btn{width:100%;padding:5px 0;border:1.5px dashed #c0d4f5;border-radius:8px;background:#f4f8ff;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;justify-content:center;gap:4px;}
    .card-img-btn:hover{border-color:var(--primary);color:var(--primary);background:#eef5ff;}

    /* 미리보기 선택지 버튼 */
    .preview-choice-btn{width:100%;padding:14px 18px;border-radius:14px;border:2px solid;font-family:var(--font-h);font-size:16px;cursor:pointer;text-align:left;transition:transform .1s,filter .1s;backdrop-filter:blur(4px);}
    .preview-choice-btn:hover{filter:brightness(1.2);transform:translateY(-2px);}
    .preview-choice-btn:active{transform:scale(.97);}

    /* ================================================================
       Admin 운영 대시보드 CSS
       ================================================================ */
    .admin-sheet {
      background:#fff;border-radius:20px;width:100%;max-width:720px;
      box-shadow:0 16px 48px rgba(0,0,0,.3);overflow:hidden;
    }
    .admin-header {
      background:var(--primary);padding:16px 22px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .admin-header-title { font-family:var(--font-h);font-size:19px;color:#fff; }
    .admin-header-sub   { font-size:11px;color:rgba(255,255,255,.75);margin-top:2px; }
    .admin-refresh-btn,.admin-close-btn {
      background:rgba(255,255,255,.18);border:none;color:#fff;
      width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;
    }
    .admin-close-btn { font-size:17px; }
    .admin-summary-bar {
      display:flex;align-items:center;gap:16px;flex-wrap:wrap;
      background:#f8fbff;border-bottom:1px solid #e0eaf5;padding:12px 22px;
    }
    .admin-summary-item { display:flex;align-items:center;gap:5px; }
    .admin-summary-total { margin-right:6px; }
    .admin-summary-num   { font-family:var(--font-h);font-size:18px;color:var(--text); }
    .admin-summary-label { font-size:11px;color:var(--muted); }
    .admin-summary-dot   { font-size:13px; }
    .admin-filter-bar {
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 22px;border-bottom:1px solid #e0eaf5;gap:10px;flex-wrap:wrap;
    }
    .admin-filters,.admin-sorts { display:flex;align-items:center;gap:6px;flex-wrap:wrap; }
    .admin-sort-label { font-size:11px;color:var(--muted); }
    .admin-filter-btn,.admin-sort-btn {
      padding:4px 12px;border-radius:50px;border:1.5px solid #d0e0f5;
      background:#fff;color:var(--text);font-family:var(--font-h);font-size:12px;cursor:pointer;
      transition:all .15s;
    }
    .admin-filter-btn.active,.admin-sort-btn.active { background:var(--primary);border-color:var(--primary);color:#fff; }
    .admin-filter-btn:hover:not(.active),.admin-sort-btn:hover:not(.active) { background:#e8f0ff;border-color:var(--primary); }
    .admin-team-list { padding:12px 18px 24px;display:flex;flex-direction:column;gap:10px; }
    .admin-team-card {
      border:1.5px solid #e0eaf5;border-radius:14px;background:#f8fbff;
      overflow:hidden;transition:border-color .15s;
    }
    .admin-team-card:hover { border-color:#b0c8f0; }
    .admin-team-card[data-status="needs-attention"] { border-color:#ffc0c0;background:#fff8f8; }
    .admin-team-card[data-status="ready"]           { border-color:#b0e8cc;background:#f8fff9; }
    .admin-card-head {
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 14px 8px;gap:8px;flex-wrap:wrap;
    }
    .admin-card-identity { display:flex;align-items:center;gap:8px;flex-wrap:wrap; }
    .admin-card-name { font-family:var(--font-h);font-size:15px;color:var(--text); }
    .admin-status-badge { font-family:var(--font-h);font-size:11px;padding:2px 10px;border-radius:50px; }
    .admin-badge { font-size:10px;padding:2px 8px;border-radius:50px;border:1px solid currentColor; }
    .admin-badge--true { color:#b08000;background:#fffbee; }
    .admin-badge--img  { color:#5a3e8a;background:#f0eeff; }
    .admin-badge--conn { color:#3a6ab0;background:#e8f0ff; }
    .admin-card-actions { display:flex;align-items:center;gap:6px;flex-shrink:0; }
    .admin-action-btn {
      padding:5px 12px;border-radius:50px;border:none;
      font-family:var(--font-h);font-size:12px;cursor:pointer;
      transition:filter .12s,transform .12s;white-space:nowrap;
    }
    .admin-action-btn:hover  { filter:brightness(1.1); }
    .admin-action-btn:active { transform:scale(.96); }
    .admin-action-btn--maker  { background:#e8f0ff;color:var(--primary); }
    .admin-action-btn--viewer { background:#d4f5e8;color:#1a6b4a; }
    .admin-action-btn--viewer.admin-action-btn--disabled { opacity:.4;cursor:not-allowed; }
    .admin-action-btn--detail { background:#f0f4ff;color:#5a6a8a; }
    .admin-action-btn--more   { background:#f0f4ff;color:var(--muted);padding:5px 10px; }
    .admin-more-wrap { position:relative; }
    .admin-more-menu {
      position:absolute;right:0;top:calc(100% + 4px);
      background:#fff;border:1.5px solid #e0eaf5;border-radius:10px;
      box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:120px;z-index:500;overflow:hidden;
    }
    .admin-more-item {
      display:block;width:100%;padding:9px 14px;border:none;background:none;
      font-family:var(--font-h);font-size:12px;text-align:left;cursor:pointer;color:var(--text);
    }
    .admin-more-item:hover { background:#fff0f0;color:#c00; }
    .admin-card-body { padding:0 14px 12px; }
    .admin-card-stats { font-size:12px;color:var(--muted);margin-bottom:4px; }
    .admin-card-interp { font-size:13px;color:var(--text);line-height:1.6;margin-bottom:6px; }
    .admin-problems { display:flex;flex-wrap:wrap;gap:6px;margin-top:2px; }
    .admin-problem { font-size:11px;padding:2px 8px;border-radius:50px;background:#fff0f0;color:#c00;border:1px solid #ffc0c0; }
    .admin-team-detail { border-top:1px solid #e8f0f8; }
    .admin-detail-inner { padding:12px 14px 14px; }
    .admin-detail-section { margin-bottom:12px; }
    .admin-detail-label { font-size:11px;color:var(--muted);margin-bottom:6px;font-family:var(--font-h); }
    .admin-detail-problems { display:flex;flex-wrap:wrap;gap:6px; }
    .admin-scene-chips { display:flex;flex-wrap:wrap;gap:6px;margin-top:4px; }
    .admin-scene-chip { background:#fff;border:1.5px solid;border-radius:10px;padding:6px 10px;font-size:11px;min-width:80px; }
    .chip-type  { display:block;font-family:var(--font-h); }
    .chip-title { display:block;color:var(--text);margin:2px 0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .chip-next  { display:block;color:var(--muted);font-size:10px; }
    .admin-loading,.admin-empty { text-align:center;padding:24px;color:var(--muted);font-size:13px; }
    .admin-error { text-align:center;padding:24px;color:#ef476f;font-size:13px; }
  </style>
</head>
<body>

<!-- 입장 화면 -->
<div id="join-screen">
  <div class="join-card">
    <div style="font-size:48px;margin-bottom:8px">🌿</div>
    <h1>가지 프로그램</h1>
    <p style="margin-bottom:16px;">우리 모둠 이름과 비밀번호를 입력해요!</p>

    <!-- 클래스 코드 입력 (v2에서만 표시 — js로 토글) -->
    <div id="join-code-wrap" style="display:none;">
      <input id="join-code" class="join-input" placeholder="클래스 코드 (예: ABC123)" maxlength="10"
        style="text-transform:uppercase;letter-spacing:2px;"/>
    </div>

    <input id="join-input" class="join-input" placeholder="팀 이름 (예: 2모둠)" maxlength="20"
     />
    <input id="join-pin" class="join-input" type="password" placeholder="PIN (숫자 4~6자리)" maxlength="6"
     
      style="letter-spacing:4px;font-size:22px;"/>
    <div id="join-error" style="color:#ef476f;font-size:12px;min-height:18px;margin-bottom:6px;"></div>
    <button class="join-btn" id="btn-join">입장하기 →</button>
    <div class="join-hint" style="margin-top:10px;line-height:1.6;">
      처음 입장하면 입력한 PIN으로 새 팀이 만들어져요<br>
      같은 팀은 똑같은 이름 + PIN으로 들어오세요
    </div>

    <!-- 템플릿 선택 -->
    <div style="margin-top:20px;text-align:left;">
      <div style="font-family:var(--font-h);font-size:13px;color:#7a8fa6;margin-bottom:10px;text-align:center;">
        📐 시작 템플릿 선택 (선택사항)
      </div>
      <div id="template-btns" style="display:flex;flex-direction:column;gap:7px;">
        <button data-tpl="blank" id="tpl-blank" class="tpl-btn"
          style="padding:9px 14px;border-radius:10px;font-family:var(--font-h);font-size:13px;cursor:pointer;text-align:left;border:2px solid var(--primary);background:#e8f0ff;color:var(--primary);">
          ✏️ 빈 화면으로 시작
        </button>
        <button data-tpl="two-ending" id="tpl-two-ending" class="tpl-btn"
          style="padding:9px 14px;border-radius:10px;font-family:var(--font-h);font-size:13px;cursor:pointer;text-align:left;border:2px solid #d0e0f5;background:#fff;color:var(--text);">
          🔀 2가지 결말 — 선택에 따라 결말이 달라져요
        </button>
        <button data-tpl="rejoin" id="tpl-rejoin" class="tpl-btn"
          style="padding:9px 14px;border-radius:10px;font-family:var(--font-h);font-size:13px;cursor:pointer;text-align:left;border:2px solid #d0e0f5;background:#fff;color:var(--text);">
          🔄 갈라졌다 합류 — 나눴다가 다시 만나요
        </button>
        <button data-tpl="true-end" id="tpl-true-end" class="tpl-btn"
          style="padding:9px 14px;border-radius:10px;font-family:var(--font-h);font-size:13px;cursor:pointer;text-align:left;border:2px solid #d0e0f5;background:#fff;color:var(--text);">
          ⭐ 진엔딩 포함 — 숨겨진 진짜 결말이 있어요
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 툴바 -->
<!-- ── 툴바 ── -->
<div id="toolbar">

  <!-- ── 브랜드 + 현재 상태 ── -->
  <div class="tb-identity">
    <a href="index.html" class="tb-home-link" title="홈으로" id="btn-home-link">🌿</a>
    <div class="tb-workspace-info">
      <span class="tb-workspace-label">작품 만들기</span>
      <div class="tb-team-row">
        <span id="team-badge-inline">👥 <strong id="team-label">-</strong></span>
        <div id="online-badge"><div id="online-dot"></div><span id="online-label">연결 중...</span></div>
      </div>
    </div>
  </div>

  <div class="tb-divider-v"></div>

  <!-- ── 그룹 1: 제작 ── -->
  <div class="tb-group">
    <span class="tb-group-label">제작</span>
    <div class="tb-group-btns">
      <button class="tb-btn tb-btn-add" id="btn-add-scene">＋ 장면 추가</button>
      <button class="tb-btn tb-btn-save adv-only" id="btn-export" title="JSON 파일로 저장">💾 저장</button>
      <button class="tb-btn tb-btn-load adv-only" id="btn-import" title="JSON 파일 불러오기">📂 열기</button>
      <input type="file" id="file-input" accept=".json" style="display:none"/>
      <button class="tb-btn tb-btn-clear adv-only" id="btn-clear">🗑 초기화</button>
      <button id="btn-group-move" class="tb-btn adv-only"
        style="background:#f0f4ff;color:var(--primary);border:1.5px solid #c0d4f5;">
        🔗 묶음 이동: 꺼짐
      </button>
    </div>
  </div>

  <div class="tb-divider-v adv-only"></div>

  <!-- ── 그룹 2: 점검 ── -->
  <div class="tb-group">
    <span class="tb-group-label">점검</span>
    <div class="tb-group-btns">
      <button class="tb-btn tb-btn-check" id="btn-check" title="장면 연결 구조를 검사해요">🔍 구조 검사</button>
      <button class="tb-btn" id="btn-route"
        style="background:#fff0fa;color:#9b4dca;border:1.5px solid #d4a0f0;">
        🗺 루트 보기
      </button>
    </div>
  </div>

  <!-- ── 유틸 (줌 + 모드) ── -->
  <div class="adv-only" style="display:flex;align-items:center;gap:4px;background:#f0f4ff;border-radius:50px;padding:3px 8px;border:1.5px solid #d0e0f5;">
    <button id="btn-zoom-out" style="border:none;background:none;font-size:16px;cursor:pointer;line-height:1;color:var(--primary);font-weight:bold;">−</button>
    <span id="zoom-label" style="font-family:var(--font-h);font-size:12px;color:var(--primary);min-width:36px;text-align:center;">100%</span>
    <button id="btn-zoom-in" style="border:none;background:none;font-size:16px;cursor:pointer;line-height:1;color:var(--primary);font-weight:bold;">＋</button>
    <button id="btn-zoom-reset" style="border:none;background:none;font-size:11px;cursor:pointer;color:var(--muted);">↺</button>
  </div>

  <!-- ── 범례 + 저장상태 + 모드전환 ── -->
  <div class="legend">
    <button id="mode-toggle-btn"
      style="background:#fff7e6;color:#c07000;border:1.5px solid #f0c040;border-radius:50px;
      font-family:var(--font-h);font-size:12px;padding:5px 12px;cursor:pointer;white-space:nowrap;">
      ⚙️ 더보기
    </button>
    <div id="save-status"><div id="save-dot"></div><span id="save-label">-</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--start)"></div>시작</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div>일반</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ending)"></div>엔딩</div>
    <button class="tb-btn adv-only" id="btn-help" style="background:#f0f4ff;color:var(--primary);border:1.5px solid var(--primary)">❓</button>
  </div>

</div>

<!-- 캔버스 -->
<div id="canvas-wrap">
  <!-- ── 다음 단계 패널 (캔버스 우측 하단 고정) ── -->
  <div id="next-step-panel">
    <div class="nsp-header">
      <span class="nsp-title">다음 단계</span>
      <button class="nsp-toggle" id="btn-nsp-toggle" title="접기/펼치기">−</button>
    </div>
    <div class="nsp-body" id="nsp-body">
      <button class="nsp-btn nsp-btn--preview" id="btn-preview">
        <span class="nsp-btn-icon">▶</span>
        <span class="nsp-btn-text">
          <strong>빠르게 확인하기</strong>
          <small>지금 흐름이 맞는지 확인해요</small>
        </span>
      </button>
      <button class="nsp-btn nsp-btn--viewedit" id="btn-viewer-edit">
        <span class="nsp-btn-icon">🎨</span>
        <span class="nsp-btn-text">
          <strong>감상 화면 다듬기</strong>
          <small>선택지 위치·스타일을 마감해요</small>
        </span>
      </button>
      <a class="nsp-btn nsp-btn--view" id="btn-open-viewer" href="#" target="_blank">
        <span class="nsp-btn-icon">🌐</span>
        <span class="nsp-btn-text">
          <strong>완성본 보기</strong>
          <small>실제 감상 화면으로 열어요</small>
        </span>
      </a>
    </div>
  </div>
  <div id="canvas">
    <svg id="arrows">
      <defs>
        <marker id="ahA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#4a90d9"/>
        </marker>
        <marker id="ahB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#ef476f"/>
        </marker>
      </defs>
      <line id="temp-line" x1="0" y1="0" x2="0" y2="0" stroke="#888" stroke-width="2" stroke-dasharray="6,4" display="none"/>
    </svg>
  </div>
</div>

<!-- 이미지 전체화면 모달 -->
<div id="img-modal" style="display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,0.92);align-items:center;justify-content:center;flex-direction:column;">
  <button id="btn-img-close"
    style="position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);
    border:1.5px solid rgba(255,255,255,0.3);color:#fff;border-radius:50px;
    padding:6px 16px;font-family:var(--font-h);font-size:14px;cursor:pointer;">
    ✕ 닫기
  </button>
  <img id="img-modal-src" src=""
    style="max-width:92vw;max-height:88vh;object-fit:contain;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.8);display:block;"/>
</div>

<!-- 미리보기 모드 오버레이 -->
<div id="preview-overlay" style="display:none;position:fixed;inset:0;z-index:1200;
  background:linear-gradient(135deg,#1a2a4a 0%,#2d1a4a 100%);
  align-items:center;justify-content:center;flex-direction:column;">
  <div style="position:absolute;top:0;left:0;right:0;padding:12px 20px;
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--font-h);font-size:16px;color:#fff;">▶ 미리보기 중</span>
      <span id="preview-team-badge" style="font-size:12px;color:#a0c0ff;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:50px;"></span>
    </div>
    <div style="display:flex;gap:10px;">
      <button id="btn-preview-restart"
        style="padding:6px 14px;border-radius:50px;border:1.5px solid #80c0ff;
        background:rgba(255,255,255,0.1);color:#80c0ff;font-family:var(--font-h);font-size:13px;cursor:pointer;">
        ↺ 다시 시작
      </button>
      <button id="btn-preview-open-viewer"
        style="padding:6px 14px;border-radius:50px;border:1.5px solid #56d364;
        background:rgba(86,211,100,0.15);color:#56d364;font-family:var(--font-h);font-size:13px;cursor:pointer;"
        title="실제 감상 화면으로 이동">
        🌐 완성본 보기
      </button>
      <button id="btn-preview-close"
        style="padding:6px 14px;border-radius:50px;border:1.5px solid #ff8080;
        background:rgba(255,255,255,0.1);color:#ff8080;font-family:var(--font-h);font-size:13px;cursor:pointer;">
        ✕ 수정 계속하기
      </button>
    </div>
  </div>
  <div id="preview-card" style="width:min(480px,90vw);margin-top:60px;"></div>
  <div id="preview-history" style="position:absolute;bottom:16px;left:0;right:0;
    display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:0 20px;"></div>
</div>

<!-- 루트 보기 패널 -->
<div id="route-panel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;">
  <div style="background:#fff;border-radius:20px;width:100%;max-width:600px;box-shadow:0 16px 48px rgba(0,0,0,.25);overflow:hidden;">
    <div style="background:linear-gradient(135deg,#9b4dca,#c084fc);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:var(--font-h);font-size:20px;color:#fff;">🗺 루트 보기</div>
        <div style="font-size:12px;color:rgba(255,255,255,.8);margin-top:2px;">시작부터 엔딩까지 이야기 흐름</div>
      </div>
      <button id="btn-route-close" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px 20px 8px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #f0e8ff;" id="route-tabs"></div>
    <div style="padding:16px 20px 24px;" id="route-content">
      <div style="color:var(--muted);text-align:center;padding:20px;">루트를 선택하세요</div>
    </div>
  </div>
</div>

<!-- 구조 검사 패널 -->
<div id="check-panel">
  <h3>🔍 구조 검사 결과</h3>
  <div id="check-result"></div>
  <button id="check-close">닫기</button>
</div>

<!-- 관리자 패널 -->
<div id="admin-panel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 0;">
  <div class="admin-sheet">

    <!-- 헤더 -->
    <div class="admin-header">
      <div>
        <div class="admin-header-title">🛠 교사 관리</div>
        <div class="admin-header-sub">수업 운영 대시보드</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="btn-admin-refresh" class="admin-refresh-btn">🔄</button>
        <button id="btn-admin-close" class="admin-close-btn">✕</button>
      </div>
    </div>

    <!-- 운영 요약 바 -->
    <div id="admin-summary-bar" class="admin-summary-bar"></div>

    <!-- 필터 + 정렬 바 -->
    <div id="admin-filter-bar" class="admin-filter-bar"></div>

    <!-- 팀 카드 리스트 -->
    <div id="admin-team-list" class="admin-team-list"></div>

  </div>
</div>

<!-- ================================================================
     스크립트 로드 순서 (의존성 순)
     1. Firebase SDK (head에서 로드됨)
     2. state.js   — 전역 상태 변수
     3. locks.js   — 잠금 시스템 (state 참조)
     4. firebase.js — 입장/저장/동기화 (state + locks 참조)
     5. preview.js  — 미리보기 (state 참조)
     6. ui.js       — 렌더링/편집/관리자 (모두 참조)
     ================================================================ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="state.js"></script>
<script src="locks.js"></script>
<script src="firebase.js"></script>
<script src="canvasInteraction.js"></script>
<script src="sceneRenderer.js"></script>
<script src="storyAnalyzer.js"></script>
<script src="mediaManager.js"></script>
<script src="adminConsole.js"></script>
<script src="preview.js"></script>
<script src="ui.js"></script>

</body>
